<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
    <title>Agendamento | Clínica Viva Bem</title>
  
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
    <!-- CSS -->
    <link rel="stylesheet" href="agendamento.css">
  </head>
  
<body>

  <section class="section-contato">

    <div class="container">

      <div class="section-header reveal">

        <span class="section-label">
          Agendamento
        </span>

        <h2 class="section-title">
          Marque sua <em>consulta</em>
        </h2>

        <p class="section-desc">
          Agende sua consulta de forma rápida e segura.
        </p>

      </div>

      <div class="contato-grid">

        <!-- INFO -->
        <div class="contato-info reveal">

          <p>
            Nossa equipe está pronta para oferecer o melhor
            atendimento para você e sua família.
          </p>

          <div class="contato-cards">

            <div class="contato-card">
              <div class="contato-card-icon">📍</div>

              <div>
                <strong>Endereço</strong>
                <span>Av. Principal, 500 - Centro</span>
              </div>

              <span class="contato-card-seta">→</span>
            </div>

            <div class="contato-card">
              <div class="contato-card-icon">📞</div>

              <div>
                <strong>Telefone</strong>
                <span>(11) 99999-9999</span>
              </div>

              <span class="contato-card-seta">→</span>
            </div>

          </div>

        </div>

        <!-- FORM -->
        <div class="contato-form-wrap reveal">

          <form id="formAgendamento" class="form-agendamento">

            <h3>Agendar consulta</h3>

            <p class="form-sub">
              Preencha os dados abaixo.
            </p>

            <div class="form-group">
              <label>Nome completo</label>

              <input
                type="text"
                id="nome"
                placeholder="Digite seu nome"
                required
              >
            </div>

            <div class="form-row">

              <div class="form-group">
                <label>Telefone</label>

                <input
                  type="tel"
                  id="telefone"
                  placeholder="(11) 99999-9999"
                  required
                >
              </div>

              <div class="form-group">
                <label>Email</label>

                <input
                  type="email"
                  id="email"
                  placeholder="voce@email.com"
                  required
                >
              </div>

            </div>

            <div class="form-row">

              <div class="form-group">
                <label>Especialidade</label>

                <select id="especialidade" required>
                  <option value="">Selecione</option>

                  <option>Clínica Geral</option>
                  <option>Cardiologia</option>
                  <option>Dermatologia</option>
                  <option>Neurologia</option>
                  <option>Ortopedia</option>
                </select>
              </div>

              <div class="form-group">
                <label>Médico</label>
              
                <select id="medico" required>
                  <option value="">Carregando médicos...</option>
                </select>
              </div>
              </div>

            </div>

            <div class="form-row">

              <div class="form-group">
                <label>Data</label>

                <input type="date" id="data" required>
              </div>

              <div class="form-group">
                <label>Horário</label>

                <input type="time" id="horario" required>
              </div>

            </div>

            <div class="form-group">
              <label>Observações</label>

              <textarea
                id="observacoes"
                placeholder="Digite alguma observação..."
              ></textarea>
            </div>

            <button type="submit" class="btn-primary btn-full">
              <span>Confirmar agendamento</span>
            </button>

          </form>

        </div>

      </div>

    </div>

  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="agendamento.js"></script>

</body>
</html>
