<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AccessHub- Sistema de Login</title>
  <!--favicon-->
  <link rel="icon" type="image/png" href="../login/icon/faviicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0617;
      font-family: 'Poppins', sans-serif;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(162,89,255,.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(111,0,255,.25), transparent 30%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 980px;
      min-height: 600px;
      background: #120b24;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.05);
      animation: fade .5s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── LEFT PANEL ─── */
    .left {
      width: 45%;
      padding: 45px;
      background: #0f0a1d;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .back {
      position: absolute;
      top: 30px;
      left: 30px;
      color: white;
      text-decoration: none;
      font-size: 24px;
      opacity: .7;
      transition: .3s;
    }

    .back:hover {
      opacity: 1;
      transform: translateX(-4px);
    }

    h1 {
      color: white;
      font-size: 2.2rem;
      margin-bottom: 15px;
    }

    .sub {
      color: #9d9cb5;
      font-size: .95rem;
      margin-bottom: 35px;
      line-height: 1.7;
    }

    .input-group {
      margin-bottom: 18px;
      position: relative;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,.2);
      padding: 14px 40px 14px 4px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: .3s;
      font-family: 'Poppins', sans-serif;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus {
      border-color: #9b4dff;
    }

    input::placeholder {
      color: #6b6a84;
    }

    /* Eye toggle */
    .eye-btn {
      position: absolute;
      right: 6px;
      bottom: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #6b6a84;
      display: flex;
      align-items: center;
      transition: color .2s;
    }

    .eye-btn:hover {
      color: #b26cff;
    }

    .eye-btn svg {
      width: 20px;
      height: 20px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: #8d8ca8;
      font-size: .9rem;
    }

    .remember input[type="checkbox"] {
      width: auto;
      padding: 0;
      border-bottom: none;
      accent-color: #9b4dff;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #7b2cff, #a855f7);
      color: white;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: .3s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(155,77,255,.35);
    }

    .google-btn {
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: #181028;
      color: white;
      cursor: pointer;
      margin-top: 15px;
      transition: .3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: .95rem;
    }

    .google-btn:hover {
      background: #22163a;
    }

    .cadastro {
      margin-top: 20px;
      text-align: center;
      color: #8d8ca8;
      font-size: .92rem;
    }

    .cadastro a {
      color: #b26cff;
      text-decoration: none;
      font-weight: 600;
    }

    .msg {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      font-size: .9rem;
    }

    .erro {
      background: rgba(255,0,0,.08);
      border: 1px solid rgba(255,0,0,.15);
      color: #ff8d8d;
    }

    /* ─── RIGHT PANEL ─── */
    .right {
      width: 55%;
      position: relative;
      background:
        linear-gradient(rgba(10,10,40,.4), rgba(10,10,40,.4)),
        url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(111,0,255,.15), rgba(0,0,0,.35));
    }

    /* ─── TABLET (601px – 900px) ─── */
    @media (max-width: 900px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .container {
        flex-direction: column;
        max-width: 560px;
        margin: 0 auto;
        min-height: unset;
      }

      .left {
        width: 100%;
        padding: 40px 36px 36px;
      }

      .right {
        width: 100%;
        min-height: 220px;
        order: -1;          /* image on top */
        border-radius: 0;
      }
    }

    /* ─── MOBILE (≤ 600px) ─── */
    @media (max-width: 600px) {
      body {
        padding: 0;
        align-items: stretch;
      }

      .container {
        border-radius: 0;
        box-shadow: none;
        border: none;
        max-width: 100%;
        width: 100%;
      }

      .left {
        padding: 28px 22px 36px;
      }

      .back {
        top: 20px;
        left: 18px;
        font-size: 20px;
      }

      h1 {
        font-size: 1.75rem;
        margin-top: 10px;
      }

      .sub {
        font-size: .88rem;
        margin-bottom: 26px;
      }

      .right {
        min-height: 180px;
      }

      .btn, .google-btn {
        padding: 14px;
        font-size: .93rem;
      }
    }

    /* ─── VERY SMALL (≤ 360px) ─── */
    @media (max-width: 360px) {
      h1 {
        font-size: 1.5rem;
      }

      .left {
        padding: 24px 16px 30px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- IMAGE PANEL -->
  <div class="right">
    <div class="overlay"></div>
  </div>

  <!-- FORM PANEL -->
  <div class="left">

    <a href="../../index.html" class="back">←</a><br>

    <h1>AccessHub</h1>
    <p class="sub">Faça login para acessar o sistema.</p>

    <form id="loginForm" novalidate>

      <div class="input-group">
        <input type="text" id="login" placeholder="Digite o seu usuário" autocomplete="username">
      </div>

      <div class="input-group">
        <input type="password" id="senha" placeholder="Digite a sua senha" autocomplete="current-password">

        <button type="button" class="eye-btn" id="toggleSenha" aria-label="Mostrar/ocultar senha">
          <!-- eye-off (default: password hidden) -->
          <svg id="iconEye" xmlns="http://www.w3.org/2000/svg" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M13.875 18.825A10.05 10.05 0 0112 19c-5 0-9-4-9-7
                 a9.77 9.77 0 012.168-3.568M6.343 6.343A9.956 9.956 0 0112
                 5c5 0 9 4 9 7a9.956 9.956 0 01-1.657 3.343M6.343 6.343
                 L3 3m3.343 3.343L9.88 9.88M17.657 17.657L21 21m-3.343-3.343
                 L14.12 14.12M9.88 9.88A3 3 0 0114.12 14.12"/>
          </svg>
        </button>
      </div>

      <div class="remember">
        <input type="checkbox" id="lembrar">
        <label for="lembrar">Lembrar-me</label>
      </div>

      <button class="btn" type="submit">Entrar</button>

      <button type="button" class="google-btn" id="googleLogin">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="20" alt="Google">
        Entrar com Google
      </button>

      <div id="mensagem"></div>

      <div class="cadastro">
        Não tem conta? <a href="cadastro.html">Cadastre-se</a>
      </div>
      <div class="cadastro">Dica: admin <br>Senha: senha123</div>

    </form>
  </div>
    
</div>

<script>
  const LOGIN_CORRETO = "admin";
  const SENHA_CORRETA = "senha123";

  const form      = document.getElementById("loginForm");
  const mensagem  = document.getElementById("mensagem");
  const senhaInput = document.getElementById("senha");
  const toggleBtn  = document.getElementById("toggleSenha");
  const iconEye    = document.getElementById("iconEye");

  /* ── Eye toggle ── */
  const eyeOpen = `
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0
           8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542
           7-4.477 0-8.268-2.943-9.542-7z"/>
    </svg>`;

  const eyeClosed = `
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M13.875 18.825A10.05 10.05 0 0112 19c-5 0-9-4-9-7
           a9.77 9.77 0 012.168-3.568M6.343 6.343A9.956 9.956 0
           0112 5c5 0 9 4 9 7a9.956 9.956 0 01-1.657 3.343
           M6.343 6.343L3 3m3.343 3.343L9.88 9.88M17.657
           17.657L21 21m-3.343-3.343L14.12 14.12M9.88
           9.88A3 3 0 0114.12 14.12"/>
    </svg>`;

  toggleBtn.addEventListener("click", () => {
    const visible = senhaInput.type === "text";
    senhaInput.type = visible ? "password" : "text";
    toggleBtn.innerHTML = visible ? eyeClosed : eyeOpen;
    toggleBtn.setAttribute("aria-label", visible ? "Mostrar senha" : "Ocultar senha");
  });

  /* ── Form submit ── */
  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const login = document.getElementById("login").value.trim();
    const senha = senhaInput.value.trim();

    if (!login || !senha) {
      mensagem.innerHTML = `<div class="msg erro">Preencha todos os campos.</div>`;
      return;
    }

    if (senha.length < 6) {
      mensagem.innerHTML = `<div class="msg erro">A senha deve ter no mínimo 6 caracteres.</div>`;
      return;
    }

    if (login === LOGIN_CORRETO && senha === SENHA_CORRETA) {
      window.location.href = "sucesso.html";
    } else {
      mensagem.innerHTML = `<div class="msg erro">Login ou senha incorretos.</div>`;
    }
  });

  document.getElementById("googleLogin").addEventListener("click", () => {
    window.location.href = "sucesso.html";
  });
</script>

</body>
</html>
