<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login System</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b0617;
      font-family:'Poppins',sans-serif;
      padding:20px;
      overflow:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top left, rgba(162,89,255,.25), transparent 30%),
      radial-gradient(circle at bottom right, rgba(111,0,255,.25), transparent 30%);
      pointer-events:none;
    }

    .container{
      width:100%;
      max-width:980px;
      min-height:600px;
      background:#120b24;
      border-radius:28px;
      overflow:hidden;
      display:flex;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.05);
      animation:fade .5s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .left{
      width:45%;
      padding:45px;
      background:#0f0a1d;
      display:flex;
      flex-direction:column;
      justify-content:center;
      position:relative;
    }

    .back{
      position:absolute;
      top:30px;
      left:30px;
      color:white;
      text-decoration:none;
      font-size:24px;
      opacity:.7;
      transition:.3s;
    }

    .back:hover{
      opacity:1;
      transform:translateX(-4px);
    }

    h1{
      color:white;
      font-size:2.2rem;
      margin-bottom:15px;
    }

    .sub{
      color:#9d9cb5;
      font-size:.95rem;
      margin-bottom:35px;
      line-height:1.7;
    }

    .input-group{
      margin-bottom:18px;
    }

    input{
      width:100%;
      background:transparent;
      border:none;
      border-bottom:1px solid rgba(255,255,255,.2);
      padding:14px 4px;
      color:white;
      font-size:15px;
      outline:none;
      transition:.3s;
    }

    input:focus{
      border-color:#9b4dff;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:10px;
      margin:20px 0;
      color:#8d8ca8;
      font-size:.9rem;
    }

    .remember input{
      width:auto;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:999px;
      background:linear-gradient(90deg,#7b2cff,#a855f7);
      color:white;
      font-weight:600;
      cursor:pointer;
      transition:.3s;
      margin-top:10px;
    }

    .btn:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 30px rgba(155,77,255,.35);
    }

    .google-btn{
      width:100%;
      padding:14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:#181028;
      color:white;
      cursor:pointer;
      margin-top:15px;
      transition:.3s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .google-btn:hover{
      background:#22163a;
    }

    .cadastro{
      margin-top:20px;
      text-align:center;
      color:#8d8ca8;
      font-size:.92rem;
    }

    .cadastro a{
      color:#b26cff;
      text-decoration:none;
      font-weight:600;
    }

    .dica{
      margin-top:20px;
      font-size:.85rem;
      color:#666281;
    }

    .msg{
      margin-top:18px;
      padding:14px;
      border-radius:12px;
      font-size:.9rem;
    }

    .erro{
      background:rgba(255,0,0,.08);
      border:1px solid rgba(255,0,0,.15);
      color:#ff8d8d;
    }

    .right{
      width:55%;
      position:relative;
      background:
      linear-gradient(rgba(10,10,40,.4),rgba(10,10,40,.4)),
      url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(111,0,255,.15), rgba(0,0,0,.35));
    }

    @media(max-width:900px){

      .container{
        flex-direction:column;
        max-width:500px;
      }

      .left,
      .right{
        width:100%;
      }

      .right{
        min-height:240px;
      }

    }

    @media(max-width:500px){

      .left{
        padding:35px 25px;
      }

      h1{
        font-size:1.8rem;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <div class="left">

    <a href="../../index.html" class="back">←</a><br><br>

    <h1>Sistema de Login</h1>

    <p class="sub">
      Faça login para acessar o sistema.
    </p>

    <form id="loginForm">

      <div class="input-group">
        <input type="text" id="login" placeholder="Digite o seu nome">
      </div>

      <div class="input-group">
        <input type="password" id="senha" placeholder="Digite o seu email">
      </div>

      <div class="remember">
        <input type="checkbox">
        <span>Lembrar-me</span>
      </div>

      <button class="btn" type="submit">
        Entrar
      </button>

      <button type="button" class="google-btn" id="googleLogin">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="20">
        Entrar com Google
      </button>

      <div id="mensagem"></div>

      <div class="cadastro">
        Não tem conta?
        <a href="cadastro.html">
          Cadastre-se
        </a>
      </div>

      <div class="dica">
        Dica: login = admin | senha = senha123
      </div>

    </form>

  </div>

  <div class="right">
    <div class="overlay"></div>
  </div>

</div>

<script>

const LOGIN_CORRETO = "admin";
const SENHA_CORRETA = "senha123";

const form = document.getElementById("loginForm");
const mensagem = document.getElementById("mensagem");

form.addEventListener("submit",(e)=>{

  e.preventDefault();

  const login = document.getElementById("login").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if(!login || !senha){

    mensagem.innerHTML = `
      <div class="msg erro">
        Preencha todos os campos.
      </div>
    `;

    return;
  }

  if(senha.length < 6){

    mensagem.innerHTML = `
      <div class="msg erro">
        A senha deve ter no mínimo 6 caracteres.
      </div>
    `;

    return;
  }

  if(login === LOGIN_CORRETO && senha === SENHA_CORRETA){

    window.location.href = "sucesso.html";

  }else{

    mensagem.innerHTML = `
      <div class="msg erro">
        Login ou senha incorretos.
      </div>
    `;

  }

});

document.getElementById("googleLogin").addEventListener("click",()=>{

  window.location.href = "sucesso.html";

});

</script>

</body>
</html>
