<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sucesso</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0b0617;
font-family:'Poppins',sans-serif;
padding:20px;
}

.box{
width:100%;
max-width:500px;
background:#120b24;
border-radius:24px;
padding:50px 35px;
text-align:center;
border:1px solid rgba(255,255,255,.05);
box-shadow:0 30px 80px rgba(0,0,0,.4);
}

.icon{
font-size:4rem;
margin-bottom:15px;
color: darkgreen;
}

h1{
color:white;
margin-bottom:15px;
}

p{
color:#9d9cb5;
line-height:1.8;
margin-bottom:30px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:12px 22px;
border-radius:999px;
text-decoration:none;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
font-weight:600;
transition:.3s;
font-size:.9rem;
}

.btn:hover{
transform:translateY(-3px);
}

</style>

</head>
<body>

<div class="box">

<div class="icon">✅</div>

<h1>Login realizado com sucesso</h1>

<p>
Você acessou o sistema corretamente.
</p>

<a href="login.html" class="btn">
Voltar para o sistema de login
</a><br><br>
<a href="../../index.html" class="btn">
  Voltar para o portfólio
</a>
</div>

</body>
</html>
